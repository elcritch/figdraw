on:
  push:
    branches:
    - "main"
  pull_request:
    branches:
    - "*"


jobs:
  tests:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        nimversion:
          - '2.2.10'
        os:
          - ubuntu-24.04
          - macos-14
          - windows-2022
        display:
          - none
        exclude:
          - os: ubuntu-24.04
            display: none
        include:
          - os: ubuntu-24.04
            display: x11
          - os: ubuntu-24.04
            display: wayland
    steps:
    - uses: actions/checkout@v1

    - name: Setup software OpenGL/Vulkan (Mesa) + Xvfb (X11)
      if: runner.os == 'Linux' && matrix.display == 'x11'
      timeout-minutes: 15
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          xvfb \
          libx11-xcb-dev \
          libxcb1-dev \
          libxcursor-dev \
          libxkbcommon-dev \
          libxrender-dev \
          libgl1-mesa-dev \
          libgles2-mesa-dev \
          libegl1-mesa-dev \
          mesa-utils \
          vulkan-tools \
          mesa-vulkan-drivers \
          libvulkan1 \
          libgl1-mesa-dri \
          libglx-mesa0 \
          libegl-mesa0 \
          libgles2

    - name: Setup software OpenGL/Vulkan (Mesa) + Weston (Wayland)
      if: runner.os == 'Linux' && matrix.display == 'wayland'
      timeout-minutes: 15
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          weston \
          wayland-protocols \
          libwayland-dev \
          libwayland-client0 \
          libwayland-cursor0 \
          libwayland-egl1 \
          libwayland-egl-backend-dev \
          libxkbcommon-dev \
          libxrender-dev \
          libgl1-mesa-dev \
          libgles2-mesa-dev \
          libegl1-mesa-dev \
          mesa-utils \
          vulkan-tools \
          mesa-vulkan-drivers \
          libvulkan1 \
          libgl1-mesa-dri \
          libglx-mesa0 \
          libegl-mesa0 \
          libgles2

    - name: Install Linux text shaping dependencies
      if: runner.os == 'Linux'
      timeout-minutes: 5
      run: |
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          pkg-config \
          libharfbuzz-dev \
          libfribidi-dev
        pkg-config --cflags --libs harfbuzz fribidi gl glesv2 egl

        if [[ "${{ matrix.display }}" == "x11" ]]; then
          pkg-config --cflags --libs x11-xcb xcb xcursor xkbcommon xrender
        elif [[ "${{ matrix.display }}" == "wayland" ]]; then
          pkg-config --cflags --libs wayland-client wayland-egl wayland-egl-backend xkbcommon
        fi

    - name: Vulkan diagnostics
      if: runner.os == 'Linux'
      run: |
        ls -la /usr/share/vulkan/icd.d || true
        vulkaninfo --summary || true

    - name: Install GrabNim
      if: runner.os != 'Windows'
      run: |
        curl -fsSL https://codeberg.org/janAkali/grabnim/raw/branch/master/misc/install.sh | sh
        echo "$HOME/.local/share/grabnim/current/bin" >> $GITHUB_PATH
        echo "$HOME/.nimble/bin" >> $GITHUB_PATH

    - name: Install Nim
      if: runner.os != 'Windows'
      run: |
        grabnim ${{ matrix.nimversion }}
        nim -v

    - name: Install Nim (Windows)
      if: runner.os == 'Windows'
      uses: jiro4989/setup-nim-action@v2
      with:
        nim-version: ${{ matrix.nimversion }}

    - name: Install Atlas
      run: curl -fsSL https://raw.githubusercontent.com/nim-lang/atlas/HEAD/install.sh | bash -

    - name: Versions
      run: |
        echo "Nim:: "
        nim -v
        echo "Nimble:: "
        atlas -v

    - name: Cache packages
      uses: actions/cache@v3
      with:
        path: deps/
        key: ${{ runner.os }}-${{ matrix.display }}-${{ hashFiles('figdraw.nimble') }}

    - name: Install Deps
      run: atlas install -t:8 --features:windy,sdl2,siwin,sharedlib,harfbuzz

    - name: Build Bindings
      run: |
        nim bindings
        nim c examples/siwin_shared.nim

    # - name: Build Surfer Examples
    #   if: runner.os == 'Linux' && matrix.display == 'wayland'
    #   run: |
    #     nim c examples/surfer_text.nim
    #     nim c examples/surfer_text_shaping_demo.nim

    - name: Build Tests
      if: runner.os == 'Linux' && matrix.display == 'x11'
      env:
        XDG_SESSION_TYPE: "x11"
        GALLIUM_DRIVER: "llvmpipe"
        LIBGL_ALWAYS_SOFTWARE: "1"
        MESA_GL_VERSION_OVERRIDE: "3.3"
        MESA_GLSL_VERSION_OVERRIDE: "330"
      run: |
        xvfb-run -a nim test

    - name: Build Tests
      if: runner.os == 'Linux' && matrix.display == 'wayland'
      env:
        XDG_SESSION_TYPE: "wayland"
        WAYLAND_DISPLAY: "wayland-1"
        GALLIUM_DRIVER: "llvmpipe"
        LIBGL_ALWAYS_SOFTWARE: "1"
        MESA_GL_VERSION_OVERRIDE: "3.3"
        MESA_GLSL_VERSION_OVERRIDE: "330"
        VK_ICD_FILENAMES: "/usr/share/vulkan/icd.d/lvp_icd.json"
        VK_DRIVER_FILES: "/usr/share/vulkan/icd.d/lvp_icd.json"
      run: |
        export XDG_RUNTIME_DIR="${RUNNER_TEMP}/xdg-runtime"
        mkdir -p "${XDG_RUNTIME_DIR}"
        chmod 700 "${XDG_RUNTIME_DIR}"

        weston --backend=headless-backend.so \
               --renderer=pixman \
               --socket="${WAYLAND_DISPLAY}" \
               --idle-time=0 \
               --log="${RUNNER_TEMP}/weston.log" &
        WESTON_PID=$!
        trap 'kill ${WESTON_PID} || true; wait ${WESTON_PID} || true' EXIT

        for _ in $(seq 1 50); do
          if [[ -S "${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}" ]]; then
            break
          fi
          sleep 0.1
        done
        [[ -S "${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}" ]] || (cat "${RUNNER_TEMP}/weston.log" && exit 1)

        vulkaninfo --summary || true
        nim test

    - name: Build Tests
      if: runner.os == 'macOS'
      run: |
        nim test

    - name: Build Tests
      if: runner.os == 'Windows'
      env:
        NIMFLAGS: "-d:figdraw.vulkan=off"
      run: |
        nim test

    - name: Build Tests (Vulkan Compile Check)
      if: runner.os == 'Linux' || runner.os == 'Windows'
      env:
        NIMFLAGS: "-d:figdraw.opengl=off -d:figdraw.vulkan=on"
      run: |
        nim test_compile

    - name: Upload Test Output (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: tests-output-${{ runner.os }}-${{ matrix.display }}-nim${{ matrix.nimversion }}
        path: |
          tests/output/
          ${{ runner.temp }}/weston.log
        if-no-files-found: ignore
